name: Golden Pipeline

# Reusable compliance pipeline (NIST SSDF / EO 14028 / M-22-18 / M-24-15).
# Source-of-truth skill: doolin/dave-skills skills/cicd-golden-pipeline/SKILL.md
# Adapted for a Maven + Angular + PostgreSQL project.

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "17"
      java-distribution:
        type: string
        default: "temurin"
      node-version:
        type: string
        default: "22.22.2"
      maven-test-command:
        type: string
        default: "./mvnw -B -ntp verify"
      frontend-test-command:
        type: string
        default: "npm test -- --watch=false --browsers=ChromeHeadless --code-coverage"
      frontend-dir:
        type: string
        default: "src/main/frontend"
      npm-audit-level:
        type: string
        default: "high"
      trivy-severity:
        type: string
        default: "CRITICAL,HIGH"
      evidence-retention-days:
        type: number
        default: 90

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    name: Secrets Scan (PW.6)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate enriched gitleaks report
        if: always()
        run: |
          printf '{"generator":"gitleaks","generator_version":"2.3.9","timestamp":"%s","commit":"%s","ref":"%s","scan_scope":"full-history","status":"%s","findings":[]}\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ github.sha }}" \
            "${{ github.ref }}" \
            "${{ steps.gitleaks.outcome }}" \
            > gitleaks-report.json

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: ${{ inputs.evidence-retention-days }}

      - name: Emit audit event
        if: always()
        run: |
          event='{"event":"secrets_scan","severity":"info","stage":"PW.6","status":"'"${{ job.status }}"'","run_id":"'"${{ github.run_id }}"'","commit":"'"${{ github.sha }}"'","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "$event"
          echo "$event" > audit-event-secrets-scan.json

      - name: Upload audit event
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-event-secrets-scan
          path: audit-event-secrets-scan.json
          retention-days: ${{ inputs.evidence-retention-days }}

  test:
    name: Test (backend + frontend)
    runs-on: ubuntu-latest

    env:
      # Hermetic tests via the project's existing `test` profile —
      # application-test.properties configures in-memory H2. Env vars must
      # NOT set SPRING_DATASOURCE_* here: those have higher property
      # precedence than profile-loaded files and would override H2 back to
      # Postgres. Postgres service container was removed for the same
      # reason — it's not needed when tests run against H2.
      SPRING_PROFILES_ACTIVE: test

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: maven

      - name: Set up Node ${{ inputs.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.frontend-dir }}/package-lock.json

      - name: Maven verify (backend tests + frontend build + JaCoCo)
        run: ${{ inputs.maven-test-command }}

      - name: Install frontend deps
        working-directory: ${{ inputs.frontend-dir }}
        run: npm ci

      - name: Frontend unit tests
        working-directory: ${{ inputs.frontend-dir }}
        run: ${{ inputs.frontend-test-command }}

      - name: Surefire failure summary
        if: failure()
        run: |
          {
            echo "## Surefire test failures"
            echo
            if ls target/surefire-reports/*.txt >/dev/null 2>&1; then
              for f in target/surefire-reports/*.txt; do
                if grep -qE 'FAIL|ERROR' "$f"; then
                  echo "### $(basename "$f" .txt)"
                  echo '```'
                  sed -n '1,40p' "$f"
                  echo '```'
                fi
              done
            else
              echo "_no surefire reports found_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: ignore

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: ignore

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: ${{ inputs.frontend-dir }}/coverage/
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: ignore

      - name: Emit audit event
        if: always()
        run: |
          event='{"event":"test","severity":"info","status":"'"${{ job.status }}"'","run_id":"'"${{ github.run_id }}"'","commit":"'"${{ github.sha }}"'","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "$event"
          echo "$event" > audit-event-test.json

      - name: Upload audit event
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-event-test
          path: audit-event-test.json
          retention-days: ${{ inputs.evidence-retention-days }}

  e2e:
    name: E2E (desktop + mobile viewports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node ${{ inputs.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.frontend-dir }}/package-lock.json

      - name: Install frontend deps
        working-directory: ${{ inputs.frontend-dir }}
        run: npm ci

      # iPhone 14 Pro emulation uses WebKit; keep Chromium for the
      # desktop project. --with-deps installs matching OS libraries.
      - name: Install Playwright browsers
        working-directory: ${{ inputs.frontend-dir }}
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright e2e (desktop + mobile projects)
        working-directory: ${{ inputs.frontend-dir }}
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-html-report
          path: ${{ inputs.frontend-dir }}/coverage/playwright/html-report/
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: ignore

      - name: Upload Playwright traces / screenshots / videos
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: ${{ inputs.frontend-dir }}/test-results/
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: ignore

      - name: Summarize e2e results in PR
        if: always()
        working-directory: ${{ inputs.frontend-dir }}
        run: |
          {
            echo "## Playwright e2e"
            echo
            if [ -d coverage/playwright/html-report ]; then
              echo "HTML report uploaded as \`playwright-html-report\` artifact."
            fi
            if [ -d test-results ]; then
              fail_count=$(find test-results -maxdepth 1 -type d 2>/dev/null | grep -vc '^test-results$' || echo 0)
              if [ "$fail_count" -gt 0 ]; then
                echo
                echo "**Failing test cases (screenshots + video retained):**"
                echo
                find test-results -maxdepth 1 -type d | grep -v '^test-results$' | sed 's|test-results/||' | sed 's/^/- /'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Emit audit event
        if: always()
        run: |
          event='{"event":"e2e","severity":"info","status":"'"${{ job.status }}"'","run_id":"'"${{ github.run_id }}"'","commit":"'"${{ github.sha }}"'","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "$event"
          echo "$event" > audit-event-e2e.json

      - name: Upload audit event
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-event-e2e
          path: audit-event-e2e.json
          retention-days: ${{ inputs.evidence-retention-days }}

  vulnerability-scan:
    name: Vulnerability Scan (PW.7 / PW.8)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.frontend-dir }}/package-lock.json

      - name: npm audit (production deps, frontend)
        working-directory: ${{ inputs.frontend-dir }}
        run: |
          npm ci --omit=dev
          npm audit --audit-level=${{ inputs.npm-audit-level }} --omit=dev --json > npm-audit.json
          npm audit --audit-level=${{ inputs.npm-audit-level }} --omit=dev

      - name: Upload npm audit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-audit
          path: ${{ inputs.frontend-dir }}/npm-audit.json
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: ignore

      # Order: JSON evidence first (non-gating) so it's always captured,
      # then findings go to the PR step summary (visible in the checks UI),
      # then the gating table step fails the job with the same findings.
      - name: Trivy filesystem scan (JSON evidence)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-results.json
          severity: ${{ inputs.trivy-severity }}
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Summarize Trivy findings in PR
        if: always()
        run: |
          {
            echo "## Trivy findings (severity: ${{ inputs.trivy-severity }}, fixed-only)"
            echo
            count=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json 2>/dev/null || echo 0)
            echo "**Total fixable findings at configured severity:** $count"
            echo
            if [ "$count" -gt 0 ]; then
              echo "| CVE | Severity | Package | Installed | Fixed in |"
              echo "| --- | --- | --- | --- | --- |"
              jq -r '[.Results[]?.Vulnerabilities[]?] | unique_by(.VulnerabilityID + .PkgName) | .[] | "| \(.VulnerabilityID) | \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "-") |"' trivy-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trivy filesystem scan (human-readable gate)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: ${{ inputs.trivy-severity }}
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: ignore

      - name: Emit audit event
        if: always()
        run: |
          event='{"event":"vulnerability_scan","severity":"info","stage":"PW.7_PW.8","status":"'"${{ job.status }}"'","run_id":"'"${{ github.run_id }}"'","commit":"'"${{ github.sha }}"'","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "$event"
          echo "$event" > audit-event-vulnerability-scan.json

      - name: Upload audit event
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-event-vulnerability-scan
          path: audit-event-vulnerability-scan.json
          retention-days: ${{ inputs.evidence-retention-days }}

  sbom:
    name: SBOM (PW.4)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Java ${{ inputs.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: maven

      - name: Resolve Maven production dependencies
        run: ./mvnw -B -ntp dependency:resolve -DincludeScope=runtime

      - name: Set up Node (production-only install for frontend SBOM)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install frontend production deps only
        working-directory: ${{ inputs.frontend-dir }}
        run: npm ci --omit=dev

      - name: Generate CycloneDX SBOM (syft, repo root)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false

      - name: Upload SBOM evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: error

      - name: Emit audit event
        if: always()
        run: |
          event='{"event":"sbom","severity":"info","stage":"PW.4","status":"'"${{ job.status }}"'","run_id":"'"${{ github.run_id }}"'","commit":"'"${{ github.sha }}"'","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "$event"
          echo "$event" > audit-event-sbom.json

      - name: Upload audit event
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-event-sbom
          path: audit-event-sbom.json
          retention-days: ${{ inputs.evidence-retention-days }}

  oscal:
    name: OSCAL (M-24-15)
    runs-on: ubuntu-latest
    needs: vulnerability-scan
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Download vulnerability scan evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "{npm-audit,trivy-results}"
          merge-multiple: true
          path: evidence/

      - name: Generate OSCAL artifacts
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: node scripts/generate-oscal.js evidence/ oscal/

      - name: Upload OSCAL evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oscal
          path: oscal/
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: error

      - name: Emit audit event
        if: always()
        run: |
          event='{"event":"oscal","severity":"info","stage":"M-24-15","status":"'"${{ job.status }}"'","run_id":"'"${{ github.run_id }}"'","commit":"'"${{ github.sha }}"'","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "$event"
          echo "$event" > audit-event-oscal.json

      - name: Upload audit event
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-event-oscal
          path: audit-event-oscal.json
          retention-days: ${{ inputs.evidence-retention-days }}

  verify-evidence:
    name: Verify Evidence
    runs-on: ubuntu-latest
    needs: [secrets-scan, test, e2e, vulnerability-scan, sbom, oscal]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Download all evidence artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: evidence/

      - name: Archive pipeline definition
        run: |
          mkdir -p evidence/pipeline-definition
          cp .github/workflows/golden-pipeline.yml evidence/pipeline-definition/
          cp .github/workflows/ci-cd.yml evidence/pipeline-definition/ 2>/dev/null || true

      - name: Verify evidence + generate SHA-256 manifest
        run: node scripts/verify-evidence.js evidence/ evidence-manifest.json

      - name: Upload evidence manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evidence-manifest
          path: evidence-manifest.json
          retention-days: ${{ inputs.evidence-retention-days }}
          if-no-files-found: error

      - name: Emit audit event
        if: always()
        run: |
          event='{"event":"verify_evidence","severity":"info","status":"'"${{ job.status }}"'","run_id":"'"${{ github.run_id }}"'","commit":"'"${{ github.sha }}"'","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          echo "$event"
          echo "$event" > audit-event-verify-evidence.json

      - name: Upload audit event
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-event-verify-evidence
          path: audit-event-verify-evidence.json
          retention-days: ${{ inputs.evidence-retention-days }}
