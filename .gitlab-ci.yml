# GitLab CI — per-repo caller for the reusable Golden Pipeline.
# Mirrors .github/workflows/ci-cd.yml.
#
# Required GitLab setup:
#   - A GitLab project at gitlab.<your-host>/<group>/javasprang
#   - Shared runners enabled (gitlab.com) OR a self-hosted runner
#     with the `docker` executor
#   - (For SLSA provenance) Sigstore OIDC trust + $COSIGN_ENABLED=true
#     in the project's CI/CD variables
#   - (For evidence archival) $EVIDENCE_BUCKET + S3 credentials as
#     masked/protected CI variables
#
# Compared to the GitHub version, deploy / attest stages are NOT in
# here yet — same scope as the GitHub ci-cd.yml.

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push"'

stages:
  - compliance-check       # secrets-scan, test, vuln-scan in parallel
  - compliance-sbom        # needs test
  - compliance-oscal       # needs vuln-scan
  - compliance-verify      # needs vuln-scan + sbom + oscal
  - package                # main/master only: jar + SLSA provenance
  - attest                 # main/master only: Solana on-chain attestation

variables:
  JAVA_VERSION: "17"
  NODE_VERSION: "20.11.1"
  FRONTEND_DIR: "src/main/frontend"
  # Initial baseline (matches .github/workflows/ci-cd.yml). Raise to
  # "CRITICAL,HIGH" once the HIGH baseline is clean.
  TRIVY_SEVERITY: "CRITICAL"
  NPM_AUDIT_LEVEL: "high"
  EVIDENCE_RETENTION_DAYS: "90"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  MAVEN_CLI_OPTS: "-B -ntp"
  # NOTE: set to "true" once Sigstore OIDC is configured on the
  # GitLab instance (or a COSIGN_PRIVATE_KEY / COSIGN_PASSWORD pair is
  # provisioned as masked/protected variables).
  COSIGN_ENABLED: "false"

include:
  - local: '.gitlab/ci/golden-pipeline.yml'

# ---------------------------------------------------------------------
# Caller-specific jobs
# ---------------------------------------------------------------------

package:
  stage: package
  image: eclipse-temurin:17-jdk
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
  needs:
    - job: secrets-scan
    - job: test
    - job: vulnerability-scan
    - job: sbom
    - job: oscal
    - job: verify-evidence
  cache:
    key: maven-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository
  before_script:
    - mkdir -p src/main/resources/static
    - |
      printf '{"commit":"%s","run_id":"%s","built_at":"%s"}\n' \
        "$CI_COMMIT_SHA" "$CI_PIPELINE_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        > src/main/resources/static/version.json
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipTests package
    - jar_path=$(ls target/*.jar | grep -v -- '-plain\.jar$' | head -n1)
    - sha256sum "$jar_path" | tee "$jar_path.sha256"
    - echo "JAR_PATH=$jar_path" > jar.env
    # NOTE: cosign sign-blob for SLSA build provenance.
    # Requires either:
    #   (a) Sigstore OIDC: GitLab's $CI_JOB_JWT_V2 identity token
    #       (COSIGN_EXPERIMENTAL=1, cosign sign-blob --oidc-issuer=...)
    #   (b) Keyed signing: $COSIGN_PRIVATE_KEY + $COSIGN_PASSWORD in
    #       CI/CD variables
    # Skipped unless $COSIGN_ENABLED=true.
    - |
      if [ "$COSIGN_ENABLED" = "true" ]; then
        echo "TODO: wire cosign sign-blob --yes \"$jar_path\""
        exit 1
      else
        echo "{\"event\":\"slsa_provenance\",\"severity\":\"info\",\"status\":\"skipped-stub\",\"reason\":\"COSIGN_ENABLED=false\"}"
      fi
  after_script:
    - |
      echo "{\"event\":\"package\",\"severity\":\"info\",\"status\":\"$CI_JOB_STATUS\",\"pipeline_id\":\"$CI_PIPELINE_ID\",\"commit\":\"$CI_COMMIT_SHA\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
  artifacts:
    name: "app-jar-$CI_COMMIT_SHORT_SHA"
    expire_in: 90 days
    paths:
      - target/*.jar
      - target/*.sha256
      - src/main/resources/static/version.json

attest:
  stage: attest
  image: node:20-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
  needs:
    - job: secrets-scan
    - job: test
    - job: vulnerability-scan
    - job: sbom
    - job: oscal
    - job: verify-evidence
  variables:
    ARTIFACT_DIR: ci-artifacts
    OUTPUT_DIR: ci-output
    # Map GitLab CI vars to the env vars attest.mjs expects.
    GITHUB_SHA: $CI_COMMIT_SHA
    GITHUB_REPOSITORY: $CI_PROJECT_PATH
    GITHUB_REF_NAME: $CI_COMMIT_REF_NAME
    GITHUB_RUN_ID: $CI_PIPELINE_ID
    GITHUB_SERVER_URL: $CI_SERVER_URL
    CI_PROVENANCE: gitlab
    SOLANA_NETWORK: ${SOLANA_NETWORK:-devnet}
    # Fixed paths so they persist across before_script/script/after_script.
    SOLANA_KEYPAIR_PATH: /tmp/solana-keypair.json
    AWS_WEB_IDENTITY_TOKEN_FILE: /tmp/gitlab-oidc-token
    AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - apk add --no-cache bash aws-cli openssl
    # Write GitLab OIDC token for AWS assume-role-with-web-identity.
    - |
      if [ -n "$AWS_ROLE_ARN" ]; then
        echo "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
      fi
    - cd scripts && npm ci && cd "$CI_PROJECT_DIR"
    # Collect artifacts from prior jobs into a flat directory.
    - mkdir -p ci-artifacts
    - cp gitleaks-report.json ci-artifacts/ 2>/dev/null || true
    - cp trivy-results.json ci-artifacts/ 2>/dev/null || true
    - cp "$FRONTEND_DIR/npm-audit.json" ci-artifacts/ 2>/dev/null || true
    - cp sbom.cyclonedx.json ci-artifacts/ 2>/dev/null || true
    - cp -r oscal/* ci-artifacts/ 2>/dev/null || true
    - cp evidence-manifest.json ci-artifacts/ 2>/dev/null || true
    # Write Solana keypair (printf, not echo — avoids trailing newline
    # that breaks JSON-array parsing).
    - |
      if [ -n "$SOLANA_KEYPAIR" ]; then
        printf '%s' "$SOLANA_KEYPAIR" > "$SOLANA_KEYPAIR_PATH"
        chmod 600 "$SOLANA_KEYPAIR_PATH"
      fi
  script:
    - node scripts/attest.mjs
  after_script:
    - rm -f "$SOLANA_KEYPAIR_PATH" "$AWS_WEB_IDENTITY_TOKEN_FILE"
    - |
      echo "{\"event\":\"attest\",\"severity\":\"info\",\"status\":\"$CI_JOB_STATUS\",\"pipeline_id\":\"$CI_PIPELINE_ID\",\"commit\":\"$CI_COMMIT_SHA\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
  artifacts:
    expire_in: 90 days
    when: always
    name: "attestation-$CI_COMMIT_SHORT_SHA"
    paths:
      - ci-output/ci-artifacts.zip
      - ci-output/attestation.pdf
      - ci-output/timestamp.tsr
      - ci-output/tsa-certchain.pem

# Future work (tracked in-skill via cross-refs):
#   deploy: per-env Helm / k8s / Lambda — needs infra + deploy token
